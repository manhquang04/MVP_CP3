<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Explore Map | WanderTale</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet"/>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/assets/css/tailwind-config.js"></script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #explore-map .mapboxgl-ctrl-attrib, #explore-map .mapboxgl-ctrl-logo { display: none !important; }
        .place-card { transition: all 0.2s ease; cursor: pointer; }
        .place-card:hover { transform: translateX(4px); border-color: #f48c25; }
        .place-card.active { border-color: #f48c25; background: rgba(244, 140, 37, 0.1); }
        /* Remove popup close button border */
        .mapboxgl-popup-close-button {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        .mapboxgl-popup-close-button:focus {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased font-display flex flex-col h-screen">
    <!-- Header -->
    <div id="header-slot"></div>
    
    <div class="relative flex flex-1 w-full overflow-hidden pt-28">
        <main class="relative flex flex-1 overflow-hidden">
            <!-- Map Container (Left Side) -->
            <div class="relative flex-1 bg-slate-200 dark:bg-slate-900 overflow-hidden">
                <div id="explore-map" class="absolute inset-0 z-0"></div>
                
                <!-- Map Controls -->
                <div class="absolute right-4 top-4 z-20 flex flex-col gap-2">
                    <button id="zoom-in-btn" class="size-11 rounded-full bg-white dark:bg-background-dark shadow-xl flex items-center justify-center text-slate-700 dark:text-slate-300 hover:bg-slate-50 transition-colors">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                    <button id="zoom-out-btn" class="size-11 rounded-full bg-white dark:bg-background-dark shadow-xl flex items-center justify-center text-slate-700 dark:text-slate-300 hover:bg-slate-50 transition-colors">
                        <span class="material-symbols-outlined">remove</span>
                    </button>
                    <button id="locate-btn" class="size-11 mt-2 rounded-full bg-primary shadow-xl flex items-center justify-center text-white hover:bg-primary/90 transition-colors">
                        <span class="material-symbols-outlined">my_location</span>
                    </button>
                </div>
            </div>
            
            <!-- Sidebar (Right Side) -->
            <aside class="w-96 flex flex-col bg-white dark:bg-background-dark border-l border-primary/10 shadow-2xl z-30 overflow-hidden">
                <!-- Search Section -->
                <div class="p-4 border-b border-slate-100 dark:border-slate-800">
                    <h2 class="text-xl font-bold mb-3 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">explore</span>
                        <span data-i18n="exploreNearby">Explore Nearby</span>
                    </h2>
                    
                    <!-- Location Input -->
                    <div class="relative mb-3">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">location_on</span>
                        <input 
                            id="location-input" 
                            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 pl-10 pr-10 py-3 text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" 
                            placeholder="" 
                            data-i18n-placeholder="locationPlaceholder"
                            type="text"
                        />
                        <button id="use-my-location-btn" class="absolute right-3 top-1/2 -translate-y-1/2 text-primary hover:text-primary/80 transition-colors" title="" data-i18n-title="useMyLocation">
                            <span class="material-symbols-outlined text-lg">my_location</span>
                        </button>
                    </div>
                    
                    <!-- Category Input -->
                    <div class="relative mb-3">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">category</span>
                        <input 
                            id="type-input" 
                            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" 
                            data-i18n-placeholder="typePlaceholder"
                            placeholder="" 
                            type="text"
                        />
                    </div>
                    
                    <!-- Search Button -->
                    <button id="search-places-btn" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-all">
                        <span class="material-symbols-outlined">search</span>
                        <span data-i18n="search">Search</span>
                    </button>
                    
                    <!-- Current Location Display -->
                    <div id="current-location" class="mt-3 flex items-center gap-2 text-sm text-slate-500">
                        <span class="material-symbols-outlined text-primary text-lg">location_on</span>
                        <span data-i18n="detectingLocation">Detecting your location...</span>
                    </div>
                </div>
                
                <!-- Category Filter Pills -->
                <div class="p-4 border-b border-slate-100 dark:border-slate-800">
                    <p class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider" data-i18n="quickCategories">Quick Categories</p>
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar flex-wrap">
                        <button class="category-btn active px-4 py-2 rounded-full text-xs font-bold bg-primary text-white whitespace-nowrap" data-category="all" data-i18n="all">All</button>
                        <button class="category-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 whitespace-nowrap hover:bg-primary/10 hover:text-primary transition-colors" data-category="restaurant" data-i18n="restaurants">Restaurants</button>
                        <button class="category-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 whitespace-nowrap hover:bg-primary/10 hover:text-primary transition-colors" data-category="cafe" data-i18n="cafes">Cafes</button>
                        <button class="category-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 whitespace-nowrap hover:bg-primary/10 hover:text-primary transition-colors" data-category="tourist_attraction" data-i18n="attractions">Attractions</button>
                        <button class="category-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 whitespace-nowrap hover:bg-primary/10 hover:text-primary transition-colors" data-category="lodging" data-i18n="hotels">Hotels</button>
                        <button class="category-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 whitespace-nowrap hover:bg-primary/10 hover:text-primary transition-colors" data-category="bar" data-i18n="bars">Bars</button>
                    </div>
                </div>
                
                <!-- Places List -->
                <div class="flex-1 overflow-y-auto p-4 space-y-3 hide-scrollbar">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="font-bold text-slate-700 dark:text-slate-300" data-i18n="nearbyPlaces">Nearby Places</h3>
                        <span class="text-xs text-slate-500"><span id="places-count">0</span> <span data-i18n="placesCount">places</span></span>
                    </div>
                    <div id="places-list" class="space-y-3">
                        <!-- Loading skeleton -->
                        <div class="animate-pulse flex gap-3 p-3 bg-slate-100 dark:bg-slate-800 rounded-xl">
                            <div class="size-16 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
                            <div class="flex-1 space-y-2">
                                <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
                                <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/component-loader.js"></script>
    <script>
        // Load header
        ComponentLoader.load('header-app', 'header-slot');

        // Mapbox token - loaded from config
        const MAPBOX_TOKEN = window.WanderTaleConfig?.MAPBOX_ACCESS_TOKEN || '';
        mapboxgl.accessToken = MAPBOX_TOKEN;
        
        // API base URL
        const API_BASE = 'http://localhost:3000/api';
        
        let map = null;
        let userMarker = null;
        let placeMarkers = [];
        let currentCategory = 'all';
        let userLocation = null;
        let searchLocation = null; // Location from location input
        
        // Initialize map
        function initMap() {
            map = new mapboxgl.Map({
                container: 'explore-map',
                style: 'mapbox://styles/mapbox/streets-v12',
                center: [105.8542, 21.0285], // Default: Hanoi
                zoom: 14
            });
            
            // Add navigation controls
            map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
            
            // Zoom buttons
            document.getElementById('zoom-in-btn').addEventListener('click', () => map.zoomIn());
            document.getElementById('zoom-out-btn').addEventListener('click', () => map.zoomOut());
            document.getElementById('locate-btn').addEventListener('click', locateUser);
            document.getElementById('use-my-location-btn').addEventListener('click', locateUser);
            
            // Search button
            document.getElementById('search-places-btn').addEventListener('click', performSearch);
            
            // Enter key on inputs
            document.getElementById('location-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });
            document.getElementById('type-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });
            
            // Get user location on load
            locateUser();
        }
        
        // Locate user
        function locateUser() {
            const locationEl = document.getElementById('current-location');
            locationEl.innerHTML = '<span class="material-symbols-outlined text-primary text-lg animate-spin">sync</span><span>Getting your location...</span>';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        userLocation = { lat: latitude, lng: longitude };
                        searchLocation = { lat: latitude, lng: longitude };
                        
                        // Update map
                        map.flyTo({
                            center: [longitude, latitude],
                            zoom: 15,
                            duration: 1000
                        });
                        
                        // Add user marker
                        if (userMarker) userMarker.remove();
                        userMarker = new mapboxgl.Marker({ color: '#f48c25' })
                            .setLngLat([longitude, latitude])
                            .setPopup(new mapboxgl.Popup({ offset: 25, closeButton: true, closeOnClick: false }).setHTML('<strong class="text-primary">You are here</strong>'))
                            .addTo(map);
                        
                        // Update location display
                        reverseGeocode(latitude, longitude);
                        
                        // Clear location input (using current location)
                        document.getElementById('location-input').value = '';
                        
                        // Fetch nearby places
                        fetchNearbyPlaces(latitude, longitude);
                    },
                    (error) => {
                        console.error('Geolocation error:', error);
                        locationEl.innerHTML = '<span class="material-symbols-outlined text-red-500 text-lg">error</span><span>Unable to get location</span>';
                        // Use default location (Hanoi)
                        userLocation = { lat: 21.0285, lng: 105.8542 };
                        searchLocation = { lat: 21.0285, lng: 105.8542 };
                        fetchNearbyPlaces(21.0285, 105.8542);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                locationEl.innerHTML = '<span class="material-symbols-outlined text-red-500 text-lg">error</span><span>Geolocation not supported</span>';
                userLocation = { lat: 21.0285, lng: 105.8542 };
                searchLocation = { lat: 21.0285, lng: 105.8542 };
                fetchNearbyPlaces(21.0285, 105.8542);
            }
        }
        
        // Perform search with location and type
        async function performSearch() {
            const locationInput = document.getElementById('location-input').value.trim();
            const typeInput = document.getElementById('type-input').value.trim();
            
            // If location input has value, geocode it
            if (locationInput) {
                try {
                    const params = new URLSearchParams({
                        access_token: MAPBOX_TOKEN,
                        limit: '1',
                        language: 'vi',
                        country: 'VN',
                        autocomplete: 'true',
                        types: 'place,locality,neighborhood,address,region,district'
                    });

                    // Bias kết quả về gần vị trí hiện tại nếu có
                    if (userLocation) {
                        params.append('proximity', `${userLocation.lng},${userLocation.lat}`);
                    }

                    const response = await fetch(
                        `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(locationInput)}.json?${params.toString()}`
                    );
                    const data = await response.json();
                    
                    if (data.features && data.features.length > 0) {
                        const [lng, lat] = data.features[0].center;
                        searchLocation = { lat, lng };
                        
                        // Update map
                        map.flyTo({
                            center: [lng, lat],
                            zoom: 14,
                            duration: 1000
                        });
                        
                        // Update location display
                        document.getElementById('current-location').innerHTML = 
                            `<span class="material-symbols-outlined text-primary text-lg">location_on</span><span class="truncate">${data.features[0].place_name}</span>`;
                    } else {
                        alert('Location not found. Please try a different search term.');
                        return;
                    }
                } catch (error) {
                    console.error('Geocoding error:', error);
                    alert('Failed to find location. Please try again.');
                    return;
                }
            } else if (!searchLocation && userLocation) {
                searchLocation = userLocation;
            }
            
            // Fetch places with type filter
            if (searchLocation) {
                fetchNearbyPlaces(searchLocation.lat, searchLocation.lng, typeInput);
            }
        }
        
        // Reverse geocode to get city name
        async function reverseGeocode(lat, lng) {
            try {
                const response = await fetch(
                    `https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?types=place,locality&access_token=${MAPBOX_TOKEN}`
                );
                const data = await response.json();
                const placeName = data.features?.[0]?.place_name || 'Unknown location';
                document.getElementById('current-location').innerHTML = 
                    `<span class="material-symbols-outlined text-primary text-lg">location_on</span><span class="truncate">${placeName}</span>`;
            } catch (error) {
                console.error('Reverse geocode error:', error);
            }
        }
        
        // Fetch nearby places from backend (Geoapify API)
        async function fetchNearbyPlaces(lat, lng, customType = '') {
            const placesList = document.getElementById('places-list');
            const placesCount = document.getElementById('places-count');
            
            placesList.innerHTML = `
                <div class="animate-pulse flex gap-3 p-3 bg-slate-100 dark:bg-slate-800 rounded-xl">
                    <div class="size-16 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
                        <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div>
                    </div>
                </div>
                <div class="animate-pulse flex gap-3 p-3 bg-slate-100 dark:bg-slate-800 rounded-xl">
                    <div class="size-16 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
                        <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div>
                    </div>
                </div>
            `;
            
            try {
                // Use custom type if provided, otherwise use category
                const typeParam = customType ? `&type=${encodeURIComponent(customType)}` : '';
                const categoryParam = !customType && currentCategory !== 'all' ? `&category=${currentCategory}` : '';
                const token = localStorage.getItem('token');
                
                const response = await fetch(
                    `${API_BASE}/places/nearby?lat=${lat}&lng=${lng}${categoryParam}${typeParam}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    }
                );
                
                const data = await response.json();
                
                if (data.success && data.places && data.places.length > 0) {
                    renderPlaces(data.places);
                    addPlaceMarkers(data.places);
                    placesCount.textContent = data.places.length;
                } else {
                    placesList.innerHTML = `
                        <div class="text-center py-8 text-slate-500">
                            <span class="material-symbols-outlined text-4xl mb-2">search_off</span>
                            <p>No places found nearby</p>
                            <p class="text-xs mt-1">Try a different category or search term</p>
                        </div>
                    `;
                    placesCount.textContent = '0';
                }
            } catch (error) {
                console.error('Fetch nearby places error:', error);
                placesList.innerHTML = `
                    <div class="text-center py-8 text-red-500">
                        <span class="material-symbols-outlined text-4xl mb-2">error</span>
                        <p>Failed to load places</p>
                        <p class="text-xs mt-1">${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Render places list
        function renderPlaces(places) {
            const placesList = document.getElementById('places-list');
            
            if (!places.length) {
                placesList.innerHTML = `
                    <div class="text-center py-8 text-slate-500">
                        <span class="material-symbols-outlined text-4xl mb-2">search_off</span>
                        <p>No places found</p>
                    </div>
                `;
                return;
            }
            
            placesList.innerHTML = places.map((place, index) => `
                <div class="place-card p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50" data-index="${index}" data-lat="${place.location?.lat}" data-lng="${place.location?.lng}">
                    <div class="flex gap-3">
                        <div class="size-16 rounded-lg overflow-hidden shrink-0 bg-slate-100 flex items-center justify-center">
                            ${place.photo 
                                ? `<img class="w-full h-full object-cover" src="${place.photo}" alt="${place.name}" onerror="this.parentElement.innerHTML='<span class=\\'material-symbols-outlined text-slate-400 text-2xl\\'>place</span>'"/>` 
                                : `<span class="material-symbols-outlined text-slate-400 text-2xl">${getCategoryIcon(place.category)}</span>`
                            }
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1 mb-1">
                                <span class="text-[10px] font-bold uppercase text-primary">${place.category || 'Place'}</span>
                            </div>
                            <h4 class="font-bold text-sm truncate">${place.name}</h4>
                            <p class="text-xs text-slate-500 truncate">${place.vicinity || place.address || ''}</p>
                            <div class="flex items-center gap-2 mt-1">
                                ${place.distance ? `<span class="text-xs text-slate-400 flex items-center gap-0.5"><span class="material-symbols-outlined text-xs">straighten</span>${place.distance}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Add click events
            document.querySelectorAll('.place-card').forEach(card => {
                card.addEventListener('click', () => {
                    const lat = parseFloat(card.dataset.lat);
                    const lng = parseFloat(card.dataset.lng);
                    if (lat && lng) {
                        flyToPlace(lat, lng, card.dataset.index);
                    }
                });
            });
        }
        
        // Add markers to map
        function addPlaceMarkers(places) {
            // Clear existing markers
            placeMarkers.forEach(m => m.remove());
            placeMarkers = [];
            
            places.forEach((place, index) => {
                const lat = place.location?.lat;
                const lng = place.location?.lng;
                
                if (lat && lng) {
                    const el = document.createElement('div');
                    el.className = 'place-marker';
                    el.innerHTML = `<div class="w-8 h-8 rounded-full bg-white shadow-lg flex items-center justify-center border-2 border-primary cursor-pointer hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-primary text-sm">${getCategoryIcon(place.category)}</span>
                    </div>`;
                    
                    // Create popup without close button for cleaner look
                    const popup = new mapboxgl.Popup({ 
                        offset: 25, 
                        closeButton: false, 
                        closeOnClick: false 
                    }).setHTML(`
                        <div class="p-2 max-w-[200px]">
                            <strong class="text-sm">${place.name}</strong>
                            <p class="text-xs text-slate-500">${place.vicinity || ''}</p>
                            ${place.distance ? `<p class="text-xs text-primary mt-1">${place.distance} away</p>` : ''}
                        </div>
                    `);
                    
                    const marker = new mapboxgl.Marker(el)
                        .setLngLat([lng, lat])
                        .setPopup(popup)
                        .addTo(map);
                    
                    // Store popup reference for manual control
                    marker.customPopup = popup;
                    
                    placeMarkers.push(marker);
                }
            });
        }
        
        // Current open popup
        let currentOpenPopup = null;
        
        // Close all popups
        function closeAllPopups() {
            placeMarkers.forEach(marker => {
                const popup = marker.getPopup();
                if (popup && popup.isOpen()) {
                    popup.remove();
                }
            });
            currentOpenPopup = null;
            
            // Remove active class from all cards
            document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
        }
        
        // Fly to place
        function flyToPlace(lat, lng, index) {
            // Close any open popup first
            closeAllPopups();
            
            // Remove active class from all cards
            document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
            
            // Add active class to clicked card
            const card = document.querySelector(`.place-card[data-index="${index}"]`);
            if (card) card.classList.add('active');
            
            map.flyTo({
                center: [lng, lat],
                zoom: 16,
                duration: 800
            });
            
            // Open popup for this marker
            if (placeMarkers[index] && placeMarkers[index].customPopup) {
                placeMarkers[index].customPopup.addTo(map);
                currentOpenPopup = placeMarkers[index].customPopup;
            }
        }
        
        // Get category icon
        function getCategoryIcon(category) {
            const categoryLower = (category || '').toLowerCase();
            if (categoryLower.includes('restaurant') || categoryLower.includes('dining') || categoryLower.includes('catering')) return 'restaurant';
            if (categoryLower.includes('cafe') || categoryLower.includes('coffee')) return 'coffee';
            if (categoryLower.includes('hotel') || categoryLower.includes('lodging') || categoryLower.includes('accommodation')) return 'hotel';
            if (categoryLower.includes('bar') || categoryLower.includes('pub')) return 'local_bar';
            if (categoryLower.includes('attraction') || categoryLower.includes('landmark') || categoryLower.includes('museum') || categoryLower.includes('tourism')) return 'attractions';
            if (categoryLower.includes('shop') || categoryLower.includes('store') || categoryLower.includes('commercial')) return 'storefront';
            if (categoryLower.includes('park')) return 'park';
            return 'place';
        }
        
        // Category filter
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('active', 'bg-primary', 'text-white');
                    b.classList.add('bg-slate-100', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300');
                });
                btn.classList.add('active', 'bg-primary', 'text-white');
                btn.classList.remove('bg-slate-100', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300');
                
                currentCategory = btn.dataset.category;
                // Clear type input when using category pills
                document.getElementById('type-input').value = '';
                
                if (searchLocation) {
                    fetchNearbyPlaces(searchLocation.lat, searchLocation.lng);
                } else if (userLocation) {
                    fetchNearbyPlaces(userLocation.lat, userLocation.lng);
                }
            });
        });
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
