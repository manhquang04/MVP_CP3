<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>\n    <link rel="icon" type="image/png" href="/assets/images/logo.png"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: { "display": ["Space Grotesk"] },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>.lang-btn{transition:all .2s;color:#0f172a;background:#fff;border:1px solid #cbd5e1}.lang-btn:hover{background:#f1f5f9}.lang-btn.active{background:#0f172a!important;color:#fff!important}</style>
    <title>Change Password | WanderTale</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-cover bg-center opacity-40 grayscale-[20%] dark:grayscale-[50%]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDJsTGAludXyANULelpfAK4x5p01W5XMdkXPVilAUqH_dekS6pYPWZxmre1x3aLqfzzTD4X74OoWpiEtJSTF7laPbyML01B5JKg2i5w2xfC6qBC_kheOgkV4jGCKecKK5SQo1VxS1UbOX5iYNoG0gJuvQzz0MRRqkQ3sORxtxvKoLXGiTAr9U0eIQjLS95mZLdzHdpcSYd2PLW8Cs9XUPbSeE8u9n7UL4-mOyP9rXev-B9PhkmXWgI970PFTYvUQIAkIF1TiCy9p0Yf');"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-primary/20 via-background-light/80 to-background-light dark:from-primary/10 dark:via-background-dark/80 dark:to-background-dark"></div>
    </div>
    <div class="relative z-10 w-full max-w-md">
        <div class="flex items-center justify-between mb-6">
            <a href="/app/profile/profile.html" class="inline-flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
                <span data-i18n="backToProfile">Back to Profile</span>
            </a>
            <div class="flex rounded-full overflow-hidden border border-primary/20">
                <button class="lang-btn px-3 py-1.5 text-xs font-bold" data-lang="en">EN</button>
                <button class="lang-btn px-3 py-1.5 text-xs font-bold active" data-lang="vi">VI</button>
            </div>
        </div>
        <div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-2xl shadow-xl p-8 border border-white/20 dark:border-slate-700/50">
            <div class="flex items-center gap-3 mb-8">
                <div class="size-12 rounded-full bg-primary/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-2xl text-primary">lock</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold" data-i18n="changePassword">Change Password</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm" data-i18n="updatePassword">Update your account password</p>
                </div>
            </div>
            <div id="error-message" class="hidden mb-4 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl">
                <p class="text-sm text-red-600 dark:text-red-400 font-medium"></p>
            </div>
            <div id="success-message" class="hidden mb-4 p-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl">
                <p class="text-sm text-green-600 dark:text-green-400 font-medium" data-i18n="passwordUpdated">Password updated successfully. Redirecting...</p>
            </div>
            <form id="change-password-form" class="space-y-5">
                <label class="flex flex-col gap-2">
                    <span class="text-sm font-semibold px-1 text-slate-700 dark:text-slate-300" data-i18n="currentPassword">Current Password</span>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">lock</span>
                        <input id="currentPassword" name="currentPassword" class="w-full pl-12 pr-4 py-4 rounded-xl bg-white/50 dark:bg-white/5 border border-primary/20 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" type="password" required placeholder="Enter current password"/>
                    </div>
                </label>
                <label class="flex flex-col gap-2">
                    <span class="text-sm font-semibold px-1 text-slate-700 dark:text-slate-300" data-i18n="newPassword">New Password</span>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">vpn_key</span>
                        <input id="newPassword" name="newPassword" class="w-full pl-12 pr-4 py-4 rounded-xl bg-white/50 dark:bg-white/5 border border-primary/20 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" type="password" required placeholder="At least 8 characters, letters and numbers"/>
                    </div>
                </label>
                <label class="flex flex-col gap-2">
                    <span class="text-sm font-semibold px-1 text-slate-700 dark:text-slate-300" data-i18n="confirmPassword">Confirm New Password</span>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">vpn_key</span>
                        <input id="confirmPassword" name="confirmPassword" class="w-full pl-12 pr-4 py-4 rounded-xl bg-white/50 dark:bg-white/5 border border-primary/20 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" type="password" required placeholder="Confirm new password"/>
                    </div>
                </label>
                <button type="submit" id="submit-btn" class="w-full py-4 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">check_circle</span>
                    <span data-i18n="updatePassword">Update Password</span>
                </button>
            </form>
        </div>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        // i18n for change password page
        const pwdI18n = {
            en: {
                passwordMinLength: 'New password must be at least 8 characters',
                passwordLettersNumbers: 'Password must contain both letters and numbers',
                passwordMismatch: 'New passwords do not match',
                updateFailed: 'Failed to update password'
            },
            vi: {
                passwordMinLength: 'Mật khẩu mới phải có ít nhất 8 ký tự',
                passwordLettersNumbers: 'Mật khẩu phải chứa cả chữ và số',
                passwordMismatch: 'Mật khẩu mới không khớp',
                updateFailed: 'Cập nhật mật khẩu thất bại'
            }
        };
        function tPwd(key) { return pwdI18n[i18n.currentLang]?.[key] || pwdI18n['vi'][key] || key; }

        if (!AuthGuard.isAuthenticated()) {
            window.location.href = '/auth/login.html?redirect=' + encodeURIComponent('/auth/change-password.html');
        }

        const form = document.getElementById('change-password-form');
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');
        const submitBtn = document.getElementById('submit-btn');

        function showError(msg) {
            errorEl.querySelector('p').textContent = msg;
            errorEl.classList.remove('hidden');
            successEl.classList.add('hidden');
        }
        function showSuccess() {
            successEl.classList.remove('hidden');
            errorEl.classList.add('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (newPass.length < 8) {
                showError(tPwd('passwordMinLength'));
                return;
            }
            if (!/^(?=.*[A-Za-z])(?=.*\d)/.test(newPass)) {
                showError(tPwd('passwordLettersNumbers'));
                return;
            }
            if (newPass !== confirm) {
                showError(tPwd('passwordMismatch'));
                return;
            }

            submitBtn.disabled = true;
            errorEl.classList.add('hidden');

            const result = await AuthAPI.changePassword(current, newPass);

            if (result.success) {
                showSuccess();
                setTimeout(() => {
                    window.location.href = '/app/profile/profile.html';
                }, 1500);
            } else {
                showError(result.message || 'Failed to update password');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
