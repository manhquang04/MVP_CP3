<header id="main-header" class="fixed top-6 left-1/2 transform -translate-x-1/2 w-[90%] max-w-7xl z-50 rounded-full px-8 py-4 flex items-center justify-between bg-white/10 backdrop-blur-md border border-white/20 shadow-sm transition-all duration-300">
    <div class="flex items-center gap-3">
        <div class="size-8 flex items-center justify-center">
            <span class="material-symbols-outlined text-3xl nav-link text-white">explore</span>
        </div>
        <h2 class="text-2xl font-serif font-bold tracking-wide hidden sm:block">
            <a href="/index.html" class="nav-link text-white hover:text-primary transition-colors">WanderTale</a>
        </h2>
    </div>
    <div class="hidden md:flex items-center gap-8 font-medium tracking-wide">
        <a class="nav-link text-white/90 hover:text-white transition-colors text-sm uppercase" href="/index.html" data-i18n="home">Home</a>
        <a class="nav-link text-white/90 hover:text-white transition-colors text-sm uppercase" href="/app/planner.html">Plan</a>
        <a class="nav-link text-white/90 hover:text-white transition-colors text-sm uppercase" href="/app/explore/map.html" data-i18n="explore">Explore</a>
        <a class="nav-link text-white/90 hover:text-white transition-colors text-sm uppercase" href="/public/community-stories.html" data-i18n="stories">Stories</a>
        <a class="nav-link text-white/90 hover:text-white transition-colors text-sm uppercase" href="/app/profile/profile.html" data-i18n="profile">Profile</a>
    </div>
    <div class="flex gap-3 items-center">
        <!-- Language Toggle: black by default; white only on index hero (see index.html) -->
        <div class="flex rounded-full overflow-hidden border border-slate-300 lang-toggle-wrap">
            <button class="lang-btn px-3 py-1.5 text-xs font-bold text-slate-900 bg-white/90 hover:bg-slate-100 transition-all" data-lang="en">EN</button>
            <button class="lang-btn px-3 py-1.5 text-xs font-bold active" data-lang="vi">VI</button>
        </div>
        <button id="create-story-btn" class="hidden items-center justify-center gap-2 rounded-full h-10 px-5 bg-primary text-white hover:bg-primary/90 transition-all text-sm font-bold tracking-wide uppercase shadow-lg shadow-primary/20">
            <span class="material-symbols-outlined text-lg">add_circle</span>
            <span data-i18n="create">Create</span>
        </button>
        <!-- Auth section: hidden until initPublicHeader runs to prevent flash -->
        <div id="auth-section" class="flex gap-3 items-center opacity-0 transition-opacity duration-150" style="min-width: 180px;">
            <!-- Guest: Login + Sign Up -->
            <div id="auth-guest" class="flex gap-3 items-center hidden">
                <a href="/auth/login.html" class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-full h-10 px-6 bg-transparent nav-link text-white hover:text-primary transition-colors text-sm font-medium tracking-wide uppercase border border-white/30" data-i18n="login">Login</a>
                <a href="/auth/signup.html" class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-full h-10 px-6 bg-white text-slate-900 hover:bg-slate-100 transition-colors text-sm font-bold tracking-wide uppercase" data-i18n="signup">Sign Up</a>
            </div>
            <!-- Logged in: Avatar with dropdown (same default as profile page) -->
            <div id="auth-user" class="hidden relative">
                <button id="avatar-btn" type="button" class="flex items-center justify-center size-10 rounded-full overflow-hidden border-2 border-primary/80 hover:border-primary transition-colors bg-white dark:bg-slate-800 shadow-md focus:outline-none focus:ring-2 focus:ring-primary/50" aria-label="User menu">
                    <img id="avatar-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYbPmTOr2tt9dqFEwEDeiLHytj0Q-p4iD6iSwmq2fnfn7PjN21KfgKFH5xkAfkXrE27oi_hlxOAycBf2xP0v1Sa9a528ZFnN2-EhPodEzy5ZJ6fecQ6oE7G1ajHl4DPl00yJzPI5J3KhWIkthK3bvPZP59ns_NaysMmvKTGTEE9p-wcqa7G2NONUx9Peum-sfW-JKu-CJuS8iji5DPUsZhAiwbbddXjvN3TrpTPIUSAoYQdzvGmUHHgZW5RMFpRPlKRjWDUlUaq7Gc" alt="Avatar" class="w-full h-full object-cover"/>
                </button>
                <!-- Topbar Logout button (visible whenever user is logged in) -->
                <button type="button"
                        class="topbar-logout ml-2 inline-flex items-center gap-1 px-3 py-1.5 rounded-full border border-slate-300 text-xs font-bold text-slate-800 hover:bg-slate-100 transition-colors"
                        onclick="window.AuthGuard && window.AuthGuard.logout && window.AuthGuard.logout();">
                    <span class="material-symbols-outlined text-sm">logout</span>
                    <span data-i18n="logout">Logout</span>
                </button>
                <div id="avatar-dropdown" class="absolute left-1/2 -translate-x-1/2 top-full mt-2 py-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-100 dark:border-slate-700 z-[200] opacity-0 scale-95 origin-top pointer-events-none transition-all duration-200 ease-out">
                    <a href="/app/profile/profile.html" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                        <span class="material-symbols-outlined text-lg">person</span>
                        <span data-i18n="myProfile">My Profile</span>
                    </a>
                    <a href="/app/profile/edit.html" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                        <span class="material-symbols-outlined text-lg">edit</span>
                        <span data-i18n="editProfile">Edit Profile</span>
                    </a>
                    <a href="/auth/change-password.html" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                        <span class="material-symbols-outlined text-lg">lock</span>
                        <span data-i18n="changePassword">Change Password</span>
                    </a>
                    <div class="border-t border-slate-100 dark:border-slate-700 my-1"></div>
                    <button type="button" id="logout-btn" class="flex items-center gap-2 w-full px-4 py-2.5 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors text-left">
                        <span class="material-symbols-outlined text-lg">logout</span>
                        <span data-i18n="logout">Log Out</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>

<style>
    /* Lang buttons: black on all pages/sections (overridden on index hero only) */
    #main-header .lang-toggle-wrap { border-color: rgba(15,23,42,0.3); }
    #main-header .lang-btn { color: #0f172a; background: rgba(255,255,255,0.95); }
    #main-header .lang-btn:hover { background: #f1f5f9; color: #0f172a; }
    #main-header .lang-btn.active { background: #0f172a !important; color: white !important; }
</style>

<script>
    // Header scroll effect - wait for DOM to be ready
    document.addEventListener('DOMContentLoaded', () => {
        const header = document.getElementById('main-header');

        if (header) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 100) {
                    header.classList.add('header-scrolled');
                } else {
                    header.classList.remove('header-scrolled');
                }
            });
        }
    });
</script>
